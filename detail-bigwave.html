<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - Big Wave | Jiwa Blooms</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
   <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: #FDF4F5; color: #5A4A4D; }
        
        header { text-align: center; padding: 30px 20px; background-color: #fff; border-bottom: 1px solid #F5E1E4; }
        header h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #B56576; margin: 0; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.03); }
        
        /* Tombol Kembali */
        .btn-kembali { display: inline-block; margin-bottom: 20px; color: #B56576; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .btn-kembali:hover { color: #8F7A7E; }

        /* Pengaturan untuk Logo Header */
        .logo-header {
            max-width: 250px; /* Lebar maksimal logo, bisa Kakak perbesar/perkecil angkanya */
            height: auto;
            display: block;
            margin: 0 auto; /* Memastikan logo berada persis di tengah */
        }

        /* Info Utama */
        .produk-header { text-align: center; margin-bottom: 30px; }
        .produk-header img { width: 100%; max-width: 400px; border-radius: 12px; margin-bottom: 20px; border-bottom: 8px solid #FADADD; box-sizing: border-box; }
        .produk-header h2 { margin: 0 0 10px; color: #B56576; }
        .produk-header p { color: #8F7A7E; line-height: 1.6; }
        
        .harga { font-size: 1.5rem; color: #B56576; font-weight: 600; }

        /* Galeri Varian */
        .varian-section { margin-top: 40px; border-top: 1px solid #F5E1E4; padding-top: 20px; }
        .varian-section h3 { text-align: center; margin-bottom: 20px; color: #B56576; }
        
        .galeri-varian { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        
        .kartu-varian { text-align: center; width: 150px; }
        .kartu-varian img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid #F5E1E4; transition: transform 0.3s, border-color 0.3s; }
        .kartu-varian img:hover { transform: scale(1.05); border-color: #FADADD; }
        .kartu-varian p { margin: 10px 0 0; font-size: 0.9rem; font-weight: 600; color: #5A4A4D; }

        /* Tombol Pesan Utama */
        .btn-pesan-sekarang { display: block; width: 100%; max-width: 300px; margin: 40px auto 10px; text-align: center; background-color: #FADADD; color: #5A4A4D; text-decoration: none; padding: 12px 0; border-radius: 6px; font-weight: 600; font-size: 1.1rem; transition: background 0.3s; }
        .btn-pesan-sekarang:hover { background-color: #F0C9CD; }

        /* Mengatur agar teks dan lingkaran sejajar di tengah */
        .pilihan-warna-papan {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px; /* Jarak antara teks "Pilihan Warna Papan" dan lingkaran */
            margin-top: 15px;
            margin-bottom: 20px; /* Jarak ke teks Harga di bawahnya */
        }

        /* Mengatur gaya tulisan */
        .label-warna {
            font-weight: 600;
            font-size: 16px;
            color: #a76d7a; /* Mengikuti tema warna Dusty Rose */
        }

        /* Mengatur agar ketiga lingkaran saling berjejer */
        .warna-swatches {
            display: flex;
            gap: 8px; /* Jarak antar lingkaran warna */
        }

        /* Membentuk kotak menjadi lingkaran sempurna */
        .swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid #ccc; /* Garis tepi tipis agar warna putih tidak menyatu dengan background */
            display: inline-block;
        }

        /* Memberikan warna pada masing-masing lingkaran (bisa disesuaikan kode warnanya) */
        .swatch.putih {
            background-color: #ffffff;
        }

        .swatch.biru {
            background-color: #67b3e7; /* Biru soft/pastel */
        }

        .swatch.pink {
            background-color: #f083a9; /* Pink soft/pastel */
        }
    </style>
</head>
<body>
    <header><img src="Gambar/LogoJiwablooms.png" alt="Logo Jiwa Blooms" class="logo-header"></header>
    <div class="container">

            <div class="pilihan-warna-papan">
                <span class="label-warna">Pilihan Warna Papan:</span>
                <div class="warna-swatches">
                    <span class="swatch putih" title="Putih"></span>
                    <span class="swatch biru" title="Biru"></span>
                    <span class="swatch pink" title="Pink"></span>
                </div>
            </div>
            <div class="harga">Rp 60.000</div>
        </div>
        <div class="varian-section">

            <div class="galeri-varian">
                <div class="kartu-varian"><img src="gambar/bigwave-biru.jpg" alt="Tema Biru"><p>Tema Biru</p></div>
                <div class="kartu-varian"><img src="gambar/bigwave-pink.jpg" alt="Tema Pink"><p>Tema Pink</p></div>
                <div class="kartu-varian"><img src="gambar/bigwave-maroon.jpg" alt="Tema Maroon"><p>Tema Maroon</p></div>
                <div class="kartu-varian"><img src="gambar/bigwave-mix.jpg" alt="Tema Mix"><p>Tema Mix</p></div>
            </div>
        </div>
        <a href="https://wa.me/6282143058305?text=Hai%20kak,%20saya%20tertarik%20dengan%20Big%20Wave%20nih,%20apakah%20masih%20available%20untuk%20tanggal%20...?" class="btn-pesan-sekarang">Pesan Sekarang via WA</a>

    </div>
</body>
</html>
